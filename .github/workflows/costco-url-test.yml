name: Costco URL Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install playwright beautifulsoup4
          sudo apt-get install -y xvfb

      - name: Test Costco URL access
        env:
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1
          ~/Projects/pyppeteer-scraper/venv/bin/python - <<'EOF'
          import os
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup
          from time import sleep

          with sync_playwright() as p:
              browser = p.chromium.launch(
                  headless=False,
                  executable_path="/usr/bin/chromium-browser",
                  args=["--no-sandbox", "--disable-dev-shm-usage"],
                  env={"DISPLAY": os.environ.get("DISPLAY", ":99")},
              )
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  locale="en-CA",
                  viewport={"width": 1920, "height": 1080},
                  extra_http_headers={"Accept-Language": "en-CA,en;q=0.9"},
              )
              context.add_init_script("""
                  Object.defineProperty(navigator, 'webdriver', {get: () => undefined});
                  Object.defineProperty(navigator, 'plugins', {get: () => [1,2,3,4,5]});
                  window.chrome = {runtime: {}};
              """)
              page = context.new_page()

              print("Loading homepage...")
              page.goto("https://www.costco.ca", wait_until="domcontentloaded", timeout=30000)
              print(f"Homepage title: {page.title()}")
              sleep(4)  # let Akamai sensor JS run

              try:
                  page.click("#onetrust-accept-btn-handler", timeout=5000)
                  print("Cookie consent accepted")
                  sleep(1)
              except Exception:
                  print("No cookie consent prompt")

              url = "https://www.costco.ca/aiden-ivy-sereen-6-piece-fabric-sectional.product.4000207338.html?langId=-24&province=SK&sh=true&nf=true"
              print(f"Navigating to product...")
              page.goto(url, wait_until="domcontentloaded", timeout=30000)
              print(f"Initial title: {page.title()!r} — simulating user behaviour for Akamai challenge...")

              # Simulate mouse movement so Akamai's behavioural sensor accumulates data
              import random
              for _ in range(25):
                  page.mouse.move(random.randint(100, 1800), random.randint(100, 900))
                  sleep(0.2)
              page.keyboard.press("End")
              sleep(0.5)
              page.keyboard.press("Home")

              # Akamai challenge auto-solves via JS and triggers location.reload()
              # Wait up to 60s for the price element to appear after the reload
              try:
                  price_el = page.wait_for_selector("#pull-right-price .value", timeout=60000)
                  price = price_el.inner_text().strip()
                  print(f"SUCCESS — price found: ${price}")
              except Exception as e:
                  print(f"WARN — price element never appeared: {e}")
                  content = page.content()
                  print(f"Final title: {page.title()!r}")
                  print(content[:2000])

              browser.close()
          EOF
