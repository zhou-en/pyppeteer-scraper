name: Costco URL Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install playwright beautifulsoup4
          sudo apt-get install -y xvfb

      - name: Copy Chromium profile to avoid lock conflicts
        run: |
          rm -rf /tmp/costco-chrome-profile
          mkdir -p /tmp/costco-chrome-profile/Default
          # Copy cookies and local state (contains Akamai _abck cookie)
          for f in Cookies "Local State" Preferences; do
            src="$HOME/.config/chromium/Default/$f"
            [ -f "$src" ] && cp "$src" "/tmp/costco-chrome-profile/Default/$f" || true
          done
          cp "$HOME/.config/chromium/Local State" /tmp/costco-chrome-profile/ 2>/dev/null || true
          echo "Profile copy done"
          ls -la /tmp/costco-chrome-profile/Default/

      - name: Test Costco URL with real browser profile
        env:
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1
          ~/Projects/pyppeteer-scraper/venv/bin/python - <<'EOF'
          import os
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup
          from time import sleep

          with sync_playwright() as p:
              context = p.chromium.launch_persistent_context(
                  user_data_dir="/tmp/costco-chrome-profile",
                  headless=False,
                  executable_path="/usr/bin/chromium-browser",
                  args=[
                      "--no-sandbox",
                      "--disable-dev-shm-usage",
                      "--disable-blink-features=AutomationControlled",
                  ],
                  env={"DISPLAY": os.environ.get("DISPLAY", ":99")},
                  user_agent="Mozilla/5.0 (X11; Linux aarch64) AppleWebKit/537.36 (KHTML, like Gecko) Chromium/130.0.0.0 Chrome/130.0.0.0 Safari/537.36",
                  locale="en-CA",
                  viewport={"width": 1920, "height": 1080},
                  extra_http_headers={"Accept-Language": "en-CA,en;q=0.9"},
              )
              context.add_init_script("""
                  Object.defineProperty(navigator, 'webdriver', {get: () => undefined});
                  delete navigator.__proto__.webdriver;
                  window.chrome = {runtime: {}};
              """)

              page = context.new_page()

              url = "https://www.costco.ca/aiden-ivy-sereen-6-piece-fabric-sectional.product.4000207338.html?langId=-24&province=SK&sh=true&nf=true"
              print(f"Navigating directly to product (using real profile cookies)...")
              page.goto(url, wait_until="domcontentloaded", timeout=30000)
              print(f"Title after load: {page.title()!r}")

              if page.title() == "":
                  print("Akamai challenge page — waiting up to 30s for it to solve...")
                  sleep(5)
                  print(f"Title after 5s: {page.title()!r}")

              try:
                  price_el = page.wait_for_selector("#pull-right-price .value", timeout=30000)
                  price = price_el.inner_text().strip()
                  print(f"SUCCESS — price found: ${price}")
              except Exception as e:
                  print(f"WARN — price element never appeared: {e}")
                  print(f"Final title: {page.title()!r}")
                  print(page.content()[:1500])

              context.close()
          EOF
