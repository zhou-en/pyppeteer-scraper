name: Costco URL Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install selenium selenium-stealth python-dotenv

      - name: Test Costco URL access
        env:
          BROWSER_PATH: /usr/bin/chromium-browser
          CHROMEDRIVER_PATH: /usr/bin/chromedriver
        run: |
          ~/Projects/pyppeteer-scraper/venv/bin/python - <<'EOF'
          import os
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium_stealth import stealth

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1200")

          browser_path = os.environ.get("BROWSER_PATH", "")
          if browser_path:
              opts.binary_location = browser_path

          driver_path = os.environ.get("CHROMEDRIVER_PATH", "")
          driver = webdriver.Chrome(
              service=Service(driver_path) if driver_path else None,
              options=opts,
          )

          stealth(
              driver,
              languages=["en-CA", "en"],
              vendor="Google Inc.",
              platform="Win32",
              webgl_vendor="Intel Inc.",
              renderer="Intel Iris OpenGL Engine",
              fix_hairline=True,
          )

          url = "https://www.costco.ca/p/-/aiden-ivy-sereen-6-piece-fabric-sectional/4000207338?province=SK&langId=-24&preselect=colour:taupe"
          print(f"Navigating to: {url}")
          driver.get(url)
          print(f"Page title: {driver.title}")

          try:
              WebDriverWait(driver, 5).until(
                  EC.element_to_be_clickable((By.ID, "onetrust-accept-btn-handler"))
              ).click()
              print("Cookie consent accepted")
          except Exception:
              print("No cookie consent prompt")

          try:
              price_el = WebDriverWait(driver, 10).until(
                  EC.presence_of_element_located((By.CSS_SELECTOR, "#pull-right-price .value"))
              )
              print(f"SUCCESS — price found: ${price_el.text}")
          except Exception as e:
              print(f"WARN — price selector not found: {e}")
              print("Page source snippet:")
              print(driver.page_source[:3000])

          driver.save_screenshot("screenshot.png")
          print("Screenshot saved")
          driver.quit()
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: costco-screenshot
          path: screenshot.png
