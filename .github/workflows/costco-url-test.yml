name: Costco URL Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install curl-cffi beautifulsoup4

      - name: Probe Costco API endpoints
        run: |
          ~/Projects/pyppeteer-scraper/venv/bin/python - <<'EOF'
          from curl_cffi import requests as curl_requests
          from bs4 import BeautifulSoup
          from time import sleep

          PRODUCT_ID = "4000207338"
          BASE_HEADERS = {
              "Accept-Language": "en-CA,en;q=0.9",
              "Accept-Encoding": "gzip, deflate, br",
              "Cache-Control": "no-cache",
              "Sec-Fetch-Site": "none",
              "Sec-Fetch-Mode": "navigate",
              "Sec-Fetch-Dest": "document",
              "Upgrade-Insecure-Requests": "1",
          }

          session = curl_requests.Session()

          # Warm up — we know homepage returns 200
          print("=== Homepage warmup ===")
          r = session.get(
              "https://www.costco.ca",
              impersonate="chrome120",
              headers={**BASE_HEADERS, "Accept": "text/html,application/xhtml+xml,*/*;q=0.8"},
          )
          print(f"Homepage: {r.status_code}")
          sleep(2)

          # Probe candidate endpoints
          candidates = [
              # Hybris REST API (standard SAP Commerce)
              f"https://www.costco.ca/rest/v2/canada/products/{PRODUCT_ID}?fields=FULL&lang=en&curr=CAD&langId=-24&province=SK",
              f"https://www.costco.ca/rest/v2/costcoca/products/{PRODUCT_ID}?fields=FULL&lang=en&curr=CAD",
              # Ajax product view
              f"https://www.costco.ca/AjaxProductView?productId={PRODUCT_ID}&storeId=25001&langId=-24&catalogId=29501",
              # Product page with JSON accept header
              f"https://www.costco.ca/aiden-ivy-sereen-6-piece-fabric-sectional.product.{PRODUCT_ID}.html?langId=-24&province=SK&sh=true&nf=true",
          ]

          for url in candidates:
              print(f"\n=== {url[:80]} ===")
              accept = "application/json" if "rest" in url or "Ajax" in url else "text/html,application/xhtml+xml,*/*;q=0.8"
              headers = {
                  **BASE_HEADERS,
                  "Accept": accept,
                  "Referer": "https://www.costco.ca/",
                  "Sec-Fetch-Site": "same-origin",
              }
              try:
                  r = session.get(url, impersonate="chrome120", headers=headers, timeout=15)
                  print(f"Status: {r.status_code}  Content-Type: {r.headers.get('content-type','')[:60]}")
                  if r.status_code == 200:
                      text = r.text
                      # Look for price in response
                      if '"price"' in text or '"Price"' in text or '"value"' in text:
                          print(">>> Contains price-like fields — snippet:")
                          idx = max(text.lower().find('"price"'), text.lower().find('"value"'))
                          print(text[max(0,idx-50):idx+200])
                      elif "pull-right-price" in text:
                          soup = BeautifulSoup(text, "html.parser")
                          price_el = soup.select_one("#pull-right-price .value")
                          print(f">>> HTML price element: {price_el}")
                      else:
                          print(f">>> First 300 chars: {text[:300]}")
                  else:
                      print(f">>> Body: {r.text[:300]}")
              except Exception as e:
                  print(f"Error: {e}")
              sleep(1)
          EOF
