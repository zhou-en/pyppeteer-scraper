name: Costco URL Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install curl-cffi beautifulsoup4

      - name: Test Costco URL access
        run: |
          ~/Projects/pyppeteer-scraper/venv/bin/python - <<'EOF'
          from curl_cffi import requests as curl_requests
          from bs4 import BeautifulSoup
          from time import sleep

          HEADERS = {
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8",
              "Accept-Language": "en-CA,en;q=0.9",
              "Accept-Encoding": "gzip, deflate, br",
              "Cache-Control": "no-cache",
              "Sec-Fetch-Dest": "document",
              "Sec-Fetch-Mode": "navigate",
              "Sec-Fetch-Site": "none",
              "Sec-Fetch-User": "?1",
              "Upgrade-Insecure-Requests": "1",
          }

          session = curl_requests.Session()

          print("Warming up on homepage...")
          r = session.get("https://www.costco.ca", impersonate="chrome110", headers=HEADERS)
          print(f"Homepage status: {r.status_code}")
          sleep(2)

          url = "https://www.costco.ca/aiden-ivy-sereen-6-piece-fabric-sectional.product.4000207338.html?langId=-24&province=SK&sh=true&nf=true"
          print(f"Fetching product: {url}")
          product_headers = {**HEADERS, "Sec-Fetch-Site": "same-origin", "Referer": "https://www.costco.ca/"}
          r = session.get(url, impersonate="chrome110", headers=product_headers)
          print(f"Product status: {r.status_code}")

          if r.status_code != 200:
              print(f"BLOCKED:\n{r.text[:500]}")
          else:
              soup = BeautifulSoup(r.text, "html.parser")
              price_el = soup.select_one("#pull-right-price .value")
              if price_el:
                  print(f"SUCCESS — price found: ${price_el.get_text(strip=True)}")
              else:
                  print("WARN — price selector not found")
                  print(r.text[:3000])
          EOF
