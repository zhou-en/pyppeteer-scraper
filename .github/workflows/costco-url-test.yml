name: Costco URL Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install curl-cffi beautifulsoup4

      - name: Probe Costco API
        run: |
          ~/Projects/pyppeteer-scraper/venv/bin/python - <<'EOF'
          from curl_cffi import requests as curl_requests
          from time import sleep
          import json

          PRODUCT_ID = "4000207338"
          session = curl_requests.Session()

          HEADERS = {
              "Accept-Language": "en-CA,en;q=0.9",
              "Accept-Encoding": "gzip, deflate, br",
              "Referer": "https://www.costco.ca/",
              "Sec-Fetch-Site": "same-origin",
          }

          def probe(label, url, accept="application/json"):
              print(f"\n=== {label} ===")
              try:
                  r = session.get(url, impersonate="chrome120", headers={**HEADERS, "Accept": accept}, timeout=10)
                  ct = r.headers.get("content-type", "")
                  print(f"Status: {r.status_code}  CT: {ct[:60]}")
                  body = r.text
                  if r.status_code == 200:
                      if "application/json" in ct or body.strip().startswith("{") or body.strip().startswith("["):
                          try:
                              data = json.loads(body)
                              print(f"JSON keys: {list(data.keys()) if isinstance(data, dict) else type(data)}")
                              # Look for price
                              s = json.dumps(data)
                              for key in ["price","Price","finalPrice","salePrice","currentPrice"]:
                                  idx = s.lower().find(f'"{key.lower()}"')
                                  if idx >= 0:
                                      print(f"  >> Found '{key}': {s[idx:idx+80]}")
                                      break
                          except Exception:
                              print(f"  Body: {body[:200]}")
                      else:
                          if "Access Denied" in body:
                              print("  >> Akamai block")
                          elif "Page not found" in body or "404" in body[:50]:
                              print("  >> 404 page")
                          elif "pull-right-price" in body:
                              from bs4 import BeautifulSoup
                              soup = BeautifulSoup(body, "html.parser")
                              el = soup.select_one("#pull-right-price .value")
                              print(f"  >> HTML price: {el}")
                          else:
                              print(f"  Body[:200]: {body[:200]}")
                  else:
                      if "Access Denied" in body:
                          print("  >> Akamai block")
                      elif "Page not found" in body:
                          print("  >> 404 from Costco server (API path OK, wrong site ID)")
                      else:
                          print(f"  Body[:200]: {body[:200]}")
              except Exception as e:
                  print(f"  Error: {e}")
              sleep(0.5)

          # Warm up
          r = session.get("https://www.costco.ca", impersonate="chrome120",
              headers={**HEADERS, "Accept": "text/html,*/*;q=0.8", "Sec-Fetch-Site": "none"})
          print(f"Homepage: {r.status_code}")
          sleep(2)

          # 1. Hybris base site discovery
          probe("basesites discovery", "https://www.costco.ca/rest/v2/basesites")
          probe("OCC v1 basesites",    "https://www.costco.ca/rest/v1/basesites")

          # 2. Try plausible base site IDs
          for site_id in ["costco", "costco-ca", "ca", "CA", "en", "costco_ca", "CostcoCA", "costcoCA"]:
              probe(f"site={site_id}", f"https://www.costco.ca/rest/v2/{site_id}/products/{PRODUCT_ID}?fields=FULL&lang=en&curr=CAD&langId=-24&province=SK")

          # 3. Alternative API patterns
          probe("catalog API",      f"https://www.costco.ca/CatalogController?productId={PRODUCT_ID}&storeId=25001&langId=-24")
          probe("search by ID",     f"https://www.costco.ca/ProductSearchController?N=4294959756&Ntt={PRODUCT_ID}&catalogId=29501&langId=-24&storeId=25001&pageSize=1")
          probe("price endpoint",   f"https://www.costco.ca/rest/v2/price?productIds={PRODUCT_ID}&lang=en&curr=CAD")
          EOF
