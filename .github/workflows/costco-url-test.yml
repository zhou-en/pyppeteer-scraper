name: Costco URL Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install curl-cffi beautifulsoup4

      - name: Check PriceHipster for Costco product
        run: |
          ~/Projects/pyppeteer-scraper/venv/bin/python - <<'EOF'
          from curl_cffi import requests as curl_requests
          from bs4 import BeautifulSoup
          from time import sleep

          session = curl_requests.Session()
          HEADERS = {
              "Accept": "text/html,application/xhtml+xml,*/*;q=0.8",
              "Accept-Language": "en-CA,en;q=0.9",
              "Accept-Encoding": "gzip, deflate, br",
          }

          def get(label, url):
              print(f"\n=== {label} ===")
              print(f"URL: {url}")
              r = session.get(url, impersonate="chrome120", headers=HEADERS, timeout=15)
              print(f"Status: {r.status_code}  CT: {r.headers.get('content-type','')[:60]}")
              return r

          # --- PriceHipster ---
          r = get("PriceHipster search by product ID", "https://www.pricehipster.com/search?q=4000207338")
          if r.status_code == 200:
              soup = BeautifulSoup(r.text, "html.parser")
              results = soup.select(".product, .product-item, article, [class*='product']")
              print(f"Product elements found: {len(results)}")
              print(r.text[:2000])
          sleep(1)

          r = get("PriceHipster search by name", "https://www.pricehipster.com/search?q=aiden+ivy+sereen+sectional+costco")
          if r.status_code == 200:
              print(r.text[:2000])
          sleep(1)

          # --- ShopBot.ca ---
          r = get("ShopBot search", "https://www.shopbot.ca/search/?q=aiden+ivy+sereen+sectional&store=Costco")
          if r.status_code == 200:
              soup = BeautifulSoup(r.text, "html.parser")
              print(r.text[:2000])
          sleep(1)

          # --- Direct Costco product via curl-cffi GET (sanity check) ---
          r = get("Costco product page (curl-cffi)",
              "https://www.costco.ca/aiden-ivy-sereen-6-piece-fabric-sectional.product.4000207338.html?langId=-24&province=SK&sh=true&nf=true")
          if r.status_code == 200:
              soup = BeautifulSoup(r.text, "html.parser")
              price_el = soup.select_one("#pull-right-price .value")
              title = soup.title.string if soup.title else "no title"
              print(f"Title: {title}")
              print(f"Price element: {price_el}")
              if not price_el:
                  print(r.text[:500])
          EOF
