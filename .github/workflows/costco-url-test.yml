name: Costco URL Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install curl-cffi beautifulsoup4

      - name: Probe price sources
        run: |
          ~/Projects/pyppeteer-scraper/venv/bin/python - <<'EOF'
          from curl_cffi import requests as curl_requests
          from bs4 import BeautifulSoup
          from time import sleep

          PRODUCT_ID = "4000207338"
          IOS_UA = "CostcoApp/26.4.6 CFNetwork/1568.100.1.2.1 Darwin/24.0.0"

          session = curl_requests.Session()

          def get(label, url, ua="chrome120", headers=None):
              print(f"\n=== {label} ===")
              print(f"URL: {url}")
              h = {"Accept": "text/html,*/*;q=0.8", "Accept-Language": "en-CA,en;q=0.9"}
              if headers:
                  h.update(headers)
              try:
                  r = session.get(url, impersonate=ua, headers=h, timeout=15)
                  print(f"Status: {r.status_code}  CT: {r.headers.get('content-type','')[:60]}")
                  return r
              except Exception as e:
                  print(f"ERROR: {e}")
                  return None

          # 1. Costco product page with iOS app User-Agent (no impersonation, raw CFNetwork)
          r = session.get(
              f"https://www.costco.ca/aiden-ivy-sereen-6-piece-fabric-sectional.product.{PRODUCT_ID}.html?langId=-24&province=SK&sh=true&nf=true&COSTID=iosapp_26.4.6",
              headers={
                  "User-Agent": IOS_UA,
                  "Accept": "text/html,application/xhtml+xml,*/*;q=0.8",
                  "Accept-Language": "en-CA,en;q=0.9",
              },
              timeout=15,
          )
          print(f"\n=== Costco iOS app UA (no impersonate) ===")
          print(f"Status: {r.status_code}  CT: {r.headers.get('content-type','')[:60]}")
          if r.status_code == 200:
              if "pull-right-price" in r.text:
                  soup = BeautifulSoup(r.text, "html.parser")
                  price = soup.select_one("#pull-right-price .value")
                  print(f"SUCCESS — Price: {price.get_text(strip=True) if price else 'element missing'}")
              elif "sec-if-cpt" in r.text or "Access Denied" in r.text:
                  print("BLOCKED — challenge/deny page")
              else:
                  print(r.text[:800])
          else:
              print(r.text[:400])
          sleep(2)

          # 2. Costco REST product endpoint with iOS UA (several store/site ID guesses)
          for store_id, label in [("25001", "store 25001"), ("10151", "store 10151")]:
              r = get(f"Costco REST /rest/v2/products/{store_id}",
                  f"https://www.costco.ca/rest/v2/products/{PRODUCT_ID}?langId=-24&province=SK&storeId={store_id}",
                  ua="chrome120",
                  headers={"User-Agent": IOS_UA, "Accept": "application/json"})
              if r and r.status_code == 200:
                  print(r.text[:500])
              elif r:
                  print(r.text[:200])
              sleep(1)

          # 3. Costco Hybris wcs/resources endpoint with iOS UA
          r = get("Costco wcs/resources store 25001",
              f"https://www.costco.ca/wcs/resources/store/25001/products/{PRODUCT_ID}?langId=-24",
              ua="chrome120",
              headers={"User-Agent": IOS_UA, "Accept": "application/json"})
          if r and r.status_code == 200:
              print(r.text[:500])
          elif r:
              print(r.text[:200])
          sleep(1)

          # 4. Bountii.com — Canadian price comparison
          r = get("Bountii search", f"https://www.bountii.com/search/?q={PRODUCT_ID}")
          if r and r.status_code == 200:
              soup = BeautifulSoup(r.text, "html.parser")
              results = soup.select("[class*='product'], [class*='item'], [class*='result']")
              print(f"Result elements: {len(results)}")
              prices = [t for t in soup.stripped_strings if "$" in t]
              print(f"Price strings: {prices[:5]}")
              print(r.text[:1000])
          sleep(1)

          # 5. Google Shopping — look for Costco Canada listing
          r = get("Google Shopping",
              f"https://www.google.ca/search?q=costco+canada+{PRODUCT_ID}&tbm=shop",
              headers={"Accept-Language": "en-CA"})
          if r and r.status_code == 200:
              soup = BeautifulSoup(r.text, "html.parser")
              prices = [t for t in soup.stripped_strings if "$" in t and any(c.isdigit() for c in t)]
              print(f"Price strings: {prices[:8]}")
          EOF
