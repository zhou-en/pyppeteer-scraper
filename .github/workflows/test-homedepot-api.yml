name: Test Home Depot API Reachability

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Full browser — intercept workshopsvc API response
        run: |
          python3 - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          TARGET_URL = "https://www.homedepot.ca/workshops?store=7265"
          API_SUFFIX = "workshopsvc"

          async def test():
              captured = {}

              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=True,
                      args=["--no-sandbox", "--disable-dev-shm-usage",
                            "--disable-blink-features=AutomationControlled"],
                  )
                  page = await browser.new_page(viewport={"width": 1920, "height": 1080})

                  async def on_response(response):
                      if API_SUFFIX in response.url:
                          print(f"Intercepted: {response.url}")
                          print(f"Status: {response.status}")
                          try:
                              data = await response.json()
                              captured["data"] = data
                              print(f"Keys: {list(data.keys())}")
                              events = data.get("workshopEventWsDTO", [])
                              print(f"Workshop events found: {len(events)}")
                              for e in events[:3]:
                                  print(f"  - {e.get('eventType', {}).get('name', '?')} | seats left: {e.get('remainingSeats')} | status: {e.get('workshopStatus')}")
                          except Exception as ex:
                              text = await response.text()
                              print(f"JSON parse error: {ex}")
                              print(f"Body preview: {text[:300]}")

                  page.on("response", on_response)

                  print(f"Navigating to {TARGET_URL}")
                  await page.goto(TARGET_URL, wait_until="domcontentloaded", timeout=60000)

                  # Wait up to 20s for the API call to be intercepted
                  for _ in range(40):
                      if "data" in captured:
                          break
                      await asyncio.sleep(0.5)

                  await browser.close()

              if "data" not in captured:
                  print("ERROR: API response was never intercepted")
                  exit(1)
              else:
                  print("SUCCESS: API data captured via browser interception")

          asyncio.run(test())
          EOF
