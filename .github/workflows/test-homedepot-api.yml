name: Test Home Depot API Reachability

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: curl (with UA header)
        continue-on-error: true
        run: |
          echo "=== curl (with UA) ==="
          curl -v -o /dev/null -w "status: %{http_code}\ntime: %{time_total}s\n" \
            -H "User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/119.0" \
            "https://www.homedepot.ca/api/workshopsvc/v1/workshops/all?storeId=7265&lang=en" 2>&1 || echo "curl exit code: $?"

      - name: curl (no UA header)
        continue-on-error: true
        run: |
          echo "=== curl (no UA) ==="
          curl -v -o /dev/null -w "status: %{http_code}\ntime: %{time_total}s\n" \
            "https://www.homedepot.ca/api/workshopsvc/v1/workshops/all?storeId=7265&lang=en" 2>&1 || echo "curl exit code: $?"

      - name: python requests
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import requests
          url = "https://www.homedepot.ca/api/workshopsvc/v1/workshops/all?storeId=7265&lang=en"
          headers = {"User-Agent": "Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/119.0"}
          try:
              r = requests.get(url, headers=headers, timeout=30)
              print(f"status: {r.status_code}")
              print(f"content-type: {r.headers.get('content-type', 'n/a')}")
              print(f"body preview: {r.text[:500]}")
          except Exception as e:
              print(f"exception: {type(e).__name__}: {e}")
          EOF

      - name: playwright http client
        continue-on-error: true
        run: |
          pip install playwright -q
          python -m playwright install chromium --with-deps -q
          python3 - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def test():
              url = "https://www.homedepot.ca/api/workshopsvc/v1/workshops/all?storeId=7265&lang=en"
              async with async_playwright() as p:
                  ctx = await p.request.new_context()
                  try:
                      r = await ctx.get(url, timeout=30000)
                      print(f"status: {r.status}")
                      text = await r.text()
                      print(f"body preview: {text[:500]}")
                  except Exception as e:
                      print(f"exception: {type(e).__name__}: {e}")
                  finally:
                      await ctx.dispose()

          asyncio.run(test())
          EOF
