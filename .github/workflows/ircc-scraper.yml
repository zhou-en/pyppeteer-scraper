name: IRCC Scraper

on:
  schedule:
    - cron: "0 9 * * *"    # daily at 9am UTC
    - cron: "0 0 * * 0"    # weekly cleanup on Sundays at midnight UTC
  workflow_dispatch:         # enables "Run Now" from the dashboard

jobs:
  scrape:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run IRCC scraper
        env:
          SLACK_API_TOKEN: ${{ secrets.SLACK_API_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: python scraper/canada_ircc.py

  cleanup:
    if: github.event.schedule == '0 0 * * 0'
    runs-on: ubuntu-latest
    steps:
      - name: Prune scraper_runs older than 30 days
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          pip install psycopg2-binary
          python - <<'EOF'
          import psycopg2, os
          conn = psycopg2.connect(os.environ["POSTGRES_URL"])
          cur = conn.cursor()
          cur.execute("DELETE FROM scraper_runs WHERE created_at < NOW() - INTERVAL '30 days'")
          deleted = cur.rowcount
          conn.commit()
          conn.close()
          print(f"Deleted {deleted} old scraper run(s)")
          EOF
