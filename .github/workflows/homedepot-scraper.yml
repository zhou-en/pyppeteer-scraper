name: Home Depot Scraper

on:
  schedule:
    - cron: "0 * * * *"    # hourly — workshops open fast
  workflow_dispatch:

jobs:
  scrape:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m venv ~/homedepot-venv
          ~/homedepot-venv/bin/pip install -r requirements.txt

      - name: Run Home Depot scraper
        env:
          SLACK_API_TOKEN: ${{ secrets.SLACK_API_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: ~/homedepot-venv/bin/python scraper/home_depo.py
