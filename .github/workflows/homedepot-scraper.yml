name: Home Depot Scraper

on:
  schedule:
    - cron: "0 * * * *"    # hourly — workshops open fast
  workflow_dispatch:

jobs:
  check-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Check if Pi runner is online
        run: |
          STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
            | python3 -c "
          import sys, json
          runners = json.load(sys.stdin).get('runners', [])
          pi = next((r for r in runners if r['name'] == 'pi-runner'), None)
          print(pi['status'] if pi else 'not-found')
          ")
          echo "Pi runner status: $STATUS"
          if [ "$STATUS" != "online" ]; then
            echo "::error::Pi runner is '$STATUS' — Home Depot scraper cannot run"
            exit 1
          fi

  scrape:
    needs: check-runner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m venv ~/Projects/pyppeteer-scraper/venv
          ~/Projects/pyppeteer-scraper/venv/bin/pip install -r requirements.txt

      - name: Run Home Depot scraper
        env:
          SLACK_API_TOKEN: ${{ secrets.SLACK_API_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: ~/Projects/pyppeteer-scraper/venv/bin/python scraper/home_depo.py
